  window_manager: ^0.5.1
  logger: ^2.7.0
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  provider: ^6.1.2
  flex_color_picker: ^3.8.0
  qr_flutter: ^4.1.0
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  duration: ^4.0.3
  connectivity_plus:
