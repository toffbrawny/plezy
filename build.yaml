targets:
  $default:
    builders:
      json_serializable:
        options:
          create_to_json: true
          explicit_to_json: true
          field_rename: none
          include_if_null: true
          checked: false
      freezed:
        options:
          copy_with: true
          equal: true
          to_string: true
      slang_build_runner:
        enabled: false
