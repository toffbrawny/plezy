services:
  relay:
    build: .
    restart: unless-stopped
    mem_limit: 128m
    stop_grace_period: 15s
    volumes:
      - logs:/data
    expose:
      - "8080"
    environment:
      OAUTH_BASE_URL: https://ice.plezy.app
      MAL_CLIENT_ID: ${MAL_CLIENT_ID:-}
      ANILIST_CLIENT_ID: ${ANILIST_CLIENT_ID:-}
      ANILIST_CLIENT_SECRET: ${ANILIST_CLIENT_SECRET:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bugs:
    image: ghcr.io/edde746/bugs:latest
    restart: unless-stopped
    mem_limit: 512m
    volumes:
      - bugs_data:/data
    environment:
      BUGS_AUTH__ADMIN_TOKEN: ${BUGS_AUTH__ADMIN_TOKEN}
      BUGS_PUBLIC_URL: https://bugs.plezy.app
      BUGS_RETENTION_DAYS: 90
      BUGS_SYMBOLICATION__NATIVE_SYMCACHE_CACHE_BYTES_MB: 128
      BUGS_INGEST__MAX_RAW_REQUEST_BYTES: 536870912
      BUGS_SQLITE__READER_CONNECTIONS: 4
      BUGS_SQLITE__CACHE_SIZE_MB: 16
      BUGS_SQLITE__MMAP_SIZE_MB: 64
    expose:
      - "9000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  logs:
  caddy_data:
  caddy_config:
  bugs_data:
